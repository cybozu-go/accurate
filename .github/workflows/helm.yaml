name: Lint and Test Charts

on:
  pull_request:
    paths:
      - "charts/**"
      - '!**.md'

permissions:
  contents: read

jobs:
  lint-test:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: 3.14

      - name: set up a buildkit builder
        # --driver docker-container is required to get a builder that can build multi-arch.
        # --driver-opt network=host is required to be able to push to the kind registry, which is sitting on the host at :5000.
        run: |
          docker buildx create --name=b --driver docker-container --driver-opt network=host
          docker buildx use b

      - name: Set up chart-testing
        uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2.8.0

      - name: Run chart-testing (list-changed)
        id: list-changed
        run: |
          changed=$(ct list-changed --config ct.yaml)
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Run chart-testing (lint)
        run: ct lint --config ct.yaml

      - name: Create kind cluster
        id: kind
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        if: steps.list-changed.outputs.changed == 'true'
        with:
          node_image: kindest/node:v1.35.0@sha256:4613778f3cfcd10e615029370f5786704559103cf27bef934597ba562b269661 # renovate: kindest/node
          registry: true
          registry_name: kind-registry
          registry_port: 5000
      - name: Apply cert-manager
        env:
          # renovate: datasource=helm registryUrl=https://charts.jetstack.io depName=cert-manager
          CERT_MANAGER_VERSION: v1.20.2
          CERT_MANAGER_GPG_KEY_URL: https://cert-manager.io/public-keys/cert-manager-keyring-2021-09-20-1020CF3C033D4F35BAE1C19E1226061C665DF13E.gpg
        run: |
          curl -fsSL -o cert-manager-keyring.gpg "${CERT_MANAGER_GPG_KEY_URL}"
          helm pull oci://quay.io/jetstack/charts/cert-manager \
            --version "${CERT_MANAGER_VERSION}" \
            --verify --keyring cert-manager-keyring.gpg \
            --untar --untardir ./cert-manager-chart
          helm install cert-manager ./cert-manager-chart/cert-manager \
            --namespace cert-manager --create-namespace --set crds.enabled=true
          kubectl -n cert-manager wait --for=condition=available --timeout=180s --all deployments
      - name: Prepare values.yaml
        run: |
          docker buildx build \
            --platform arm64,amd64 \
            --output type=registry,name=${{ steps.kind.outputs.LOCAL_REGISTRY }}/accurate:dev,push=true,registry.insecure=true,compression=zstd \
            .
          mkdir -p charts/accurate/ci/
          cat > charts/accurate/ci/ci-values.yaml <<EOF
          image:
            repository: ${{ steps.kind.outputs.LOCAL_REGISTRY }}/accurate
            tag: dev
            pullPolicy: Always
          EOF
      - name: Run chart-testing (install)
        run: ct install --config ct.yaml
