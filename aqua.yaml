# aqua - Declarative CLI Version Manager
# https://aquaproj.github.io/
checksum:
  enabled: true
  require_checksum: true
  supported_envs:
  - darwin
  - linux
registries:
  - type: standard
    ref: v4.446.0 # renovate: depName=aquaproj/aqua-registry
  - name: local
    type: local
    path: registry.yaml
packages:
  - name: kubernetes/kubectl@v1.35.2
  - name: kubernetes-sigs/controller-runtime/setup-envtest@v0.23.3
  - name: kubernetes-sigs/kubebuilder@v4.11.1
  - name: kubernetes-sigs/kustomize@kustomize/v5.8.0
  - name: kubernetes-sigs/kind@v0.31.0
  - name: rust-lang/mdBook@v0.5.2
  - name: mikefarah/yq@v4.50.1
  - name: clamoriniere/crd-to-markdown@v0.0.3
  - name: kubernetes-sigs/controller-tools/controller-gen@v0.20.0
  - name: helm/helm@v4.0.4
  - name: bitnami-labs/sealed-secrets@v0.34.0
  - name: goreleaser/goreleaser@v2.13.1
  - name: kubernetes/code-generator/applyconfiguration-gen@v0.35.0
    registry: local
  - name: kubernetes/code-generator/conversion-gen@v0.35.0
    registry: local
  - name: golangci/golangci-lint@v2.11.3
